<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FixTxt is a standalone RTL/LTR text utility for fixing mixed-direction text."
    />
    <title>FixTxt</title>
    <script src="theme-init.js"></script>
    <link rel="stylesheet" href="vendor/phosphor/style.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="app-header">
        <a
          class="brand-link"
          href="https://github.com/arshiafarrokhi"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="FixTxt on GitHub"
          title="FixTxt on GitHub"
        >
          <span class="brand-mark" aria-hidden="true">F</span>
          <span class="brand-name">FixTxt</span>
        </a>

        <nav class="mode-switch" aria-label="Viewer mode">
          <button
            class="mode-button is-active"
            type="button"
            id="rtlViewerMode"
            aria-pressed="true"
            title="RTL Viewer"
          >
            <span class="mode-label">RTL</span>
            <i class="ph ph-text-align-right mode-icon" aria-hidden="true"></i>
          </button>
          <button
            class="mode-button"
            type="button"
            id="jsonViewer"
            aria-pressed="false"
            title="JSON Viewer"
          >
            <span class="mode-label">JSON</span>
            <i class="ph ph-brackets-curly mode-icon" aria-hidden="true"></i>
          </button>
          <button
            class="mode-button"
            type="button"
            id="markdownViewer"
            aria-pressed="false"
            title="Markdown Viewer"
          >
            <span class="mode-label">Markdown</span>
            <i class="ph ph-markdown-logo mode-icon" aria-hidden="true"></i>
          </button>
        </nav>

        <button
          class="theme-toggle"
          type="button"
          id="themeToggle"
          aria-label="Switch to light mode"
          title="Switch theme"
        >
          <span id="themeText">Theme</span>
          <i
            class="ph ph-moon theme-icon"
            id="themeIcon"
            aria-hidden="true"
          ></i>
        </button>
      </header>

      <section class="editor-card" aria-label="Editor workspace">
        <div class="tabs-bar" aria-label="Editor tabs">
          <div
            class="tabs-scroll"
            id="tabList"
            role="tablist"
            aria-label="Open text tabs"
          >
            <button
              class="tab-add"
              type="button"
              id="addTab"
              aria-label="Add tab"
              title="Add tab"
            >
              <i class="ph ph-plus" aria-hidden="true"></i>
            </button>
          </div>
        </div>

        <div class="workspace-toolbar">
          <div class="workspace-title" aria-live="polite">
            <i
              class="ph ph-text-align-right"
              id="modeTitleIcon"
              aria-hidden="true"
            ></i>
            <span id="modeTitleText">RTL Viewer</span>
          </div>

          <div class="workspace-controls">
            <div
              class="editor-view-switch is-visible"
              id="editorViewSwitch"
              aria-label="Editor view"
            >
              <button
                class="editor-view-button is-active"
                type="button"
                id="previewView"
                aria-pressed="true"
              >
                Preview
              </button>
              <button
                class="editor-view-button"
                type="button"
                id="sourceView"
                aria-pressed="false"
              >
                Source
              </button>
            </div>

            <div
              class="json-view-switch"
              id="jsonViewSwitch"
              aria-label="JSON view mode"
            >
              <button
                class="json-view-button is-active"
                type="button"
                id="jsonTextView"
                aria-pressed="true"
              >
                Source
              </button>
              <button
                class="json-view-button"
                type="button"
                id="jsonTreeView"
                aria-pressed="false"
              >
                Tree
              </button>
            </div>

            <div
              class="markdown-align-switch"
              id="markdownAlignSwitch"
              aria-label="Markdown alignment"
            >
              <button
                class="markdown-align-button is-active"
                type="button"
                id="markdownAlignRight"
                aria-pressed="true"
                title="Align right"
              >
                <i class="ph ph-text-align-right" aria-hidden="true"></i>
                <span>Right</span>
              </button>
              <button
                class="markdown-align-button"
                type="button"
                id="markdownAlignLeft"
                aria-pressed="false"
                title="Align left"
              >
                <i class="ph ph-text-align-left" aria-hidden="true"></i>
                <span>Left</span>
              </button>
            </div>
          </div>
        </div>

        <div class="textarea-wrap">
          <div class="line-numbers" id="lineNumbers" aria-hidden="true">1</div>
          <textarea
            id="textEditor"
            dir="rtl"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            aria-label="Main text input"
            placeholder="Paste Persian, Arabic, or mixed RTL/LTR text here..."
          ></textarea>
          <div
            class="rich-viewer"
            id="rtlRichViewer"
            dir="rtl"
            role="textbox"
            tabindex="0"
            contenteditable="plaintext-only"
            spellcheck="false"
            aria-multiline="true"
            aria-label="Readable RTL preview editor"
            data-placeholder="Paste Persian, Arabic, Markdown, or mixed RTL/LTR text here..."
            hidden
          ></div>
          <div
            class="json-tree-view"
            id="jsonTreeOutput"
            dir="ltr"
            role="region"
            tabindex="0"
            aria-label="JSON tree view"
            hidden
          ></div>
          <div
            class="markdown-viewer is-align-right"
            id="markdownOutput"
            dir="rtl"
            role="textbox"
            tabindex="0"
            contenteditable="plaintext-only"
            spellcheck="false"
            aria-multiline="true"
            aria-label="Markdown preview editor"
            data-placeholder="Paste Markdown here..."
            hidden
          ></div>
        </div>

        <div class="toolbar" aria-label="Text actions">
          <button
            class="btn btn-primary"
            type="button"
            id="fixRtl"
            title="Fix RTL Direction"
            aria-label="Fix RTL Direction"
          >
            <i class="ph ph-arrows-left-right btn-icon" aria-hidden="true"></i>
            <span class="btn-text">Fix RTL</span>
          </button>
          <button
            class="btn"
            type="button"
            id="fixLtr"
            title="Fix LTR Direction"
            aria-label="Fix LTR Direction"
          >
            <i class="ph ph-arrows-left-right btn-icon" aria-hidden="true"></i>
            <span class="btn-text">Fix LTR</span>
          </button>
          <button
            class="btn"
            type="button"
            id="downloadText"
            title="Download current tab as TXT"
            aria-label="Download current tab as TXT"
          >
            <i class="ph ph-download-simple btn-icon" aria-hidden="true"></i>
            <span class="btn-text">Download TXT</span>
          </button>
          <button
            class="btn"
            type="button"
            id="pasteText"
            title="Paste"
            aria-label="Paste"
          >
            <i class="ph ph-clipboard-text btn-icon" aria-hidden="true"></i>
            <span class="btn-text">Paste</span>
          </button>
          <button
            class="btn"
            type="button"
            id="copyText"
            title="Copy"
            aria-label="Copy"
          >
            <i class="ph ph-copy btn-icon" aria-hidden="true"></i>
            <span class="btn-text">Copy</span>
          </button>
          <button
            class="btn btn-danger"
            type="button"
            id="clearAll"
            title="Clear All"
            aria-label="Clear All"
          >
            <i class="ph ph-trash btn-icon" aria-hidden="true"></i>
            <span class="btn-text">Clear</span>
          </button>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite">
      Copied to clipboard.
    </div>

    <script src="storage.js"></script>
    <script src="app.js"></script>
  </body>
</html>
