<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FixTxt is a standalone RTL/LTR text utility for fixing mixed-direction text."
    />
    <title>FixTxt</title>
    <script src="theme-init.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="app-header">
        <div class="brand">
          <h1>
            <a
              class="brand-link"
              href="https://github.com/arshiafarrokhi"
              target="_blank"
              rel="noopener noreferrer"
              >FixTxt</a
            >
          </h1>
        </div>

        <div class="mode-switch" aria-label="Viewer mode">
          <button
            class="mode-button is-active"
            type="button"
            id="rtlViewerMode"
            aria-pressed="true"
          >
            <span>RTL Viewer</span>
            <span class="mode-icon" aria-hidden="true">RTL</span>
          </button>
          <button
            class="mode-button"
            type="button"
            id="jsonViewer"
            aria-pressed="false"
          >
            <span>JSON Viewer</span>
            <span class="mode-icon" aria-hidden="true">&#123;&#125;</span>
          </button>
          <button
            class="mode-button"
            type="button"
            id="markdownViewer"
            aria-pressed="false"
          >
            <span>Markdown</span>
            <span class="mode-icon" aria-hidden="true">MD</span>
          </button>
        </div>

        <div
          class="editor-view-switch is-visible"
          id="editorViewSwitch"
          aria-label="Editor view"
        >
          <button
            class="editor-view-button"
            type="button"
            id="previewView"
            aria-pressed="false"
          >
            Preview
          </button>
          <button
            class="editor-view-button is-active"
            type="button"
            id="sourceView"
            aria-pressed="true"
          >
            Source
          </button>
        </div>

        <div
          class="json-view-switch"
          id="jsonViewSwitch"
          aria-label="JSON view mode"
        >
          <button
            class="json-view-button is-active"
            type="button"
            id="jsonTextView"
            aria-pressed="true"
          >
            Source
          </button>
          <button
            class="json-view-button"
            type="button"
            id="jsonTreeView"
            aria-pressed="false"
          >
            Tree
          </button>
        </div>

        <div
          class="markdown-align-switch"
          id="markdownAlignSwitch"
          aria-label="Markdown alignment"
        >
          <button
            class="markdown-align-button is-active"
            type="button"
            id="markdownAlignRight"
            aria-pressed="true"
          >
            Right
          </button>
          <button
            class="markdown-align-button"
            type="button"
            id="markdownAlignLeft"
            aria-pressed="false"
          >
            Left
          </button>
        </div>

        <button
          class="theme-toggle"
          type="button"
          id="themeToggle"
          aria-label="Switch to light mode"
        >
          <span class="theme-icon" id="themeIcon" aria-hidden="true"
            >&#9790;</span
          >
          <span id="themeText">Dark mode</span>
        </button>
      </header>

      <section class="editor-card" aria-label="Editor area">
        <div class="tabs-bar" aria-label="Editor tabs">
          <div
            class="tabs-scroll"
            id="tabList"
            role="tablist"
            aria-label="Open text tabs"
          >
            <button
              class="tab-add"
              type="button"
              id="addTab"
              aria-label="Add tab"
              title="Add tab"
            >
              +
            </button>
          </div>
        </div>

        <div class="textarea-wrap">
          <textarea
            id="textEditor"
            dir="rtl"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            aria-label="Main text input"
            placeholder="Paste Persian, Arabic, or mixed RTL/LTR text here..."
          ></textarea>
          <div
            class="rich-viewer"
            id="rtlRichViewer"
            dir="rtl"
            role="region"
            tabindex="0"
            aria-label="Readable RTL preview"
            data-placeholder="Paste Persian, Arabic, Markdown, or mixed RTL/LTR text here..."
            hidden
          ></div>
          <div
            class="json-tree-view"
            id="jsonTreeOutput"
            dir="ltr"
            role="region"
            tabindex="0"
            aria-label="JSON tree view"
            hidden
          ></div>
          <div
            class="markdown-viewer is-align-right"
            id="markdownOutput"
            dir="rtl"
            role="region"
            tabindex="0"
            aria-label="Markdown viewer"
            hidden
          ></div>
        </div>

        <div class="toolbar" aria-label="Text actions">
          <button
            class="btn btn-primary"
            type="button"
            id="fixRtl"
            title="Fix RTL Direction"
            aria-label="Fix RTL Direction"
          >
            <span class="btn-icon" aria-hidden="true">&#8610;</span>
            <span class="btn-text">Fix RTL Direction</span>
          </button>
          <button
            class="btn"
            type="button"
            id="fixLtr"
            title="Fix LTR Direction"
            aria-label="Fix LTR Direction"
          >
            <span class="btn-icon" aria-hidden="true">&#8611;</span>
            <span class="btn-text">Fix LTR Direction</span>
          </button>
          <button
            class="btn"
            type="button"
            id="pasteText"
            title="Paste"
            aria-label="Paste"
          >
            <span class="btn-icon" aria-hidden="true">&#128203;</span>
            <span class="btn-text">Paste</span>
          </button>
          <button
            class="btn"
            type="button"
            id="copyText"
            title="Copy"
            aria-label="Copy"
          >
            <span class="btn-icon" aria-hidden="true">&#10697;</span>
            <span class="btn-text">Copy</span>
          </button>
          <button
            class="btn btn-danger"
            type="button"
            id="clearAll"
            title="Clear All"
            aria-label="Clear All"
          >
            <span class="btn-icon" aria-hidden="true">&times;</span>
            <span class="btn-text">Clear All</span>
          </button>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite">
      Copied to clipboard.
    </div>

    <script src="storage.js"></script>
    <script src="app.js"></script>
  </body>
</html>
